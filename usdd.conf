# LJFD USDD Alert Switcher configuration
# Location on Pi: /boot/firmware/usdd.conf  (FAT32 boot partition — editable from any OS)
#
# The switcher shows the kiosk dashboard normally and takes the TV over with the
# live USDD capture when the captured screen differs enough from a calibrated
# "idle" reference. Tune these on a live USDD with: sudo usdd-calibrate.sh

# Master enable. 1 = run the switcher (auto takeover).
# 0 = leave the capture pipeline configured but never take the display over.
USDD_ENABLED=1

# Detection thresholds — mean-absolute-difference (0-255 scale) between a 64x36
# grayscale capture and the idle reference. Calibrate with usdd-calibrate.sh:
# set ON a bit below the alert reading, OFF a bit above the idle reading.
USDD_ON_THRESHOLD=25     # rise above this -> take the TV over
USDD_OFF_THRESHOLD=12    # fall below this -> hand back to the dashboard

# Debounce — number of ~0.5 s samples that must agree before switching.
USDD_ON_DEBOUNCE=3       # ~1.5 s of alert content before takeover
USDD_OFF_DEBOUNCE=6      # ~3 s back at idle before handing back

# Safety net — force a hand-back after this many seconds even if detection sticks.
# The USDD alert self-clears in ~120-180 s; keep this a bit above that.
USDD_MAX_ALERT_SEC=210

# Idle reference frame (64x36 GRAY8 = 2304 bytes), captured by usdd-calibrate.sh.
USDD_REFERENCE=/etc/usdd/idle.gray

# Detection sample rate (analysis frames per second). 2 is plenty.
USDD_FPS=2

# GStreamer video sink used to paint the capture over the dashboard during an
# alert. glimagesink (GPU/EGL) is efficient; if the overlay is blank or errors,
# try ximagesink (plain X, always works) or xvimagesink.
USDD_SINK=glimagesink
