# LJFD Kiosk Display Configuration
# Location on Pi: /boot/firmware/kiosk.conf
# Editable from any OS by mounting the SD card's boot partition (FAT32).
#
# Define your URLs below, then set ACTIVE_URL to the one to display.

# URL slot 1 (default: station dashboard)
URL_1="https://ljfd.org/station-dashboard"

# URL slot 2
URL_2="https://example.com/display2"

# Which URL to display: URL_1 or URL_2
ACTIVE_URL="URL_1"

# Optional: force the HDMI output resolution (e.g. "1920x1080"). Empty = native.
# Set to 1920x1080 on sites running the USDD alert switcher so the display matches
# the 1080p capture (clean full-screen overlay, no scaling). The TV upscales.
FORCE_RESOLUTION="1920x1080"
